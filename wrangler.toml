# wrangler.toml - Cloudflare Configuration
name = "app"
main = "server/src/worker.js" 
compatibility_date = "2024-03-18"
compatibility_flags = [ "nodejs_compat" ]

[[d1_databases]]
binding = "DB"
database_name = "campus_netra"
database_id = "0702e90d-bb0e-4046-8a99-1f9d7ef66ac7"
preview_database_id = "0702e90d-bb0e-4046-8a99-1f9d7ef66ac7"

[site]
bucket = "./client/dist"

[vars]
NODE_VERSION = "20"
VITE_API_URL = "/api"

[build]
# Mark Node-only modules as external to avoid build-time resolution errors
# (Our db.js handles these dynamically in the local environment)
external = ["mysql2/promise", "dotenv"]
