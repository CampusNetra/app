# wrangler.toml - Cloudflare Configuration
name = "app"
main = "server/src/worker.js" 
compatibility_date = "2024-10-01"
compatibility_flags = [ "nodejs_compat" ]

[[d1_databases]]
binding = "DB"
database_name = "campus_netra"
database_id = "0702e90d-bb0e-4046-8a99-1f9d7ef66ac7"
preview_database_id = "0702e90d-bb0e-4046-8a99-1f9d7ef66ac7"

[assets]
directory = "./client/dist"
binding = "ASSETS"

[vars]
NODE_VERSION = "22"
VITE_API_URL = "/api"
