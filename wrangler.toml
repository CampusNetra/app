# wrangler.toml - Cloudflare Configuration
name = "app"
main = "server/src/worker.js" 
compatibility_date = "2024-10-01"
compatibility_flags = [ "nodejs_compat" ]

[[d1_databases]]
binding = "DB"
database_name = "campus_netra"
database_id = "084fd730-2663-4440-8294-ba29c0753488"
preview_database_id = "084fd730-2663-4440-8294-ba29c0753488"

[assets]
directory = "./client/dist"
binding = "ASSETS"

[vars]
NODE_VERSION = "22"
VITE_API_URL = "/api"
